name: OSX
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron:  '0 3 * * FRI'

concurrency:
  group: ${{ github.event_name }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{github.event_name == 'pull_request'}}

jobs:
  FreeBSD-test:
    name: Test VOTCA on OSX
    strategy:
      matrix:
        runner: ['macos-14', 'macos-15', 'macos-15-intel']
    runs-on: ${{ matrix.runner }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Install deps
      run: |
        brew update
        brew install wget ccache libint libecpint boost libxc hdf5 libomp fftw pybind11 clang-format lapack gromacs
        # this hack is needed for homebrew on macos-intel 
        brew unlink libint
        $(brew --prefix)/bin/python3 -m venv $HOME/venv
        source $HOME/venv/bin/activate
        python3 -m pip install --upgrade pip
        python3 -m pip install lxml h5py rdkit
    - name: Build VOTCA
      run: |
        export OpenMP_ROOT=$(brew --prefix)/opt/libomp
        export CPLUS_INCLUDE_PATH=$(brew --prefix)/opt/lapack/include:$CPLUS_INCLUDE_PATH
        export CMAKE_PREFIX_PATH="$(brew --prefix)/opt/lapack":$CMAKE_PREFIX_PATH
        export LIBRARY_PATH=$(brew --prefix)/opt/lapack/lib:$LIBRARY_PATH
        source $HOME/venv/bin/activate
        cmake -DCMAKE_VERBOSE_MAKEFILE=ON -DCMAKE_PREFIX_PATH="$(brew --prefix libint)" -DCMAKE_BUILD_TYPE=Debug -DINSTALL_CSGAPPS=ON -DBUILD_XTP=ON -DCMAKE_INSTALL_PREFIX=/usr/local -DENABLE_WERROR=ON -DINJECT_MARCH_NATIVE=OFF -B builddir
        cmake --build builddir --parallel $(sysctl -n hw.ncpu)
        cd builddir && ctest --output-on-failure
